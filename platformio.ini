[env:esp32s3]
platform = espressif32@7.0.1
framework = arduino
; The generic esp32-s3-devkitc-1 profile boot-loops on this chip's octal
; flash; this profile matches the flash/PSRAM configuration.
board = 4d_systems_esp32s3_gen4_r8n16
board_build.arduino.memory_type = opi_opi
board_build.flash_mode = dout
board_build.boot = opi
; RTS reset re-straps this board into download mode; reboot into the app
; with the RTC watchdog after flashing instead.
board_upload.after_reset = watchdog_reset
monitor_speed = 115200
; DTR/RTS map to boot/reset straps on the S3's USB-Serial/JTAG. Keep DTR
; active and RTS inactive so opening the monitor doesn't stop the app.
monitor_dtr = 1
monitor_rts = 0
monitor_filters =
  time
  esp32_exception_decoder
lib_deps =
  fastled/FastLED@3.10.3
build_flags =
  ; Route Serial to the native USB port (hardware CDC).
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
